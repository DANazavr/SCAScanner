[package]
name = "test-rust-app"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4.0.1"
tokio = { version = "1.17.0", features = ["full"] }
serde = { version = "1.0.136", features = ["derive"] }
serde_json = "1.0.79"
reqwest = "0.11.10"
diesel = { version = "1.4.8", features = ["postgres"] }
log = "0.4.16"
env_logger = "0.9.0"
chrono = "0.4.19"
uuid = { version = "0.8.2", features = ["v4"] }
openssl = "0.10.38"
hyper = "0.14.18"
regex = "1.5.5"

[dev-dependencies]
mockito = "0.31.0"